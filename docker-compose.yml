version: "3.2"
services:
  postgres:
    image: "postgres"
    container_name: "postgres"
    env_file:
      - ./config/.env
    ports:
      - "5432:5432"
    volumes:
      - ./config/init_psql.sql:/docker-entrypoint-initdb.d/init_psql.sql
  
  app:
    image: product-loader:latest
    build: ./app/.
    env_file:
      - ./config/.env
    ports:
      - "8080:8080"
    volumes:
     - ./data:/data
    depends_on:
      - postgres